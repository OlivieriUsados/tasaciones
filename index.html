<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Tasaciones | Grupo Olivieri</title>
    <style>
        /* Eliminamos margenes y scrolls del contenedor */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f4f7f6;
        }

        /* El iframe ocupa toda la pantalla y tapa el banner de Google */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Reemplaza el src con tu URL de la Web App actual -->

        src="https://script.google.com/macros/s/AKfycbwDJt1ELo-kDz4KWtbz6MoPYhPcBn3ZjaAg-ExGTR3yNOhQuTue9xQm_ntkZDOY_vU/exec" 
        allow="camera; microphone; geolocation"
        title="App Tasaciones">

</body>
</html>
